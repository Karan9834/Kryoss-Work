<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <!-- Document title -->
  <title>kryossone App</title>
  <meta name="description" content="kryossone React Application" />
  <meta name="author" content="kryossone" />

  <!-- Preconnect to font origins to reduce DNS lookup time -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload critical LCP hero image so browser fetches it immediately -->
  <link rel="preload" as="image" href="/images/hero-visual.png" fetchpriority="high" />

  <!-- Load fonts with font-display:swap to block CLS from late font rendering -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
